<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual DOM Diff Playground</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero-block">
        <p class="eyebrow">Virtual DOM Diff</p>
        <h1>실제 DOM과 Virtual DOM Patch 흐름 검증</h1>
        <p class="summary">
          실제 영역을 Virtual DOM으로 읽고, 테스트 영역 수정 후 patch만 적용하는 흐름을 한
          페이지에서 확인합니다.
        </p>
      </section>

      <section class="toolbar">
        <button id="patch-btn" type="button">Patch</button>
        <button id="undo-btn" type="button">뒤로가기</button>
        <button id="redo-btn" type="button">앞으로가기</button>
      </section>

      <section class="meta-card">
        <strong>최근 Patch</strong>
        <p id="patch-log">No patches yet.</p>
      </section>

      <section class="workspace">
        <article class="panel">
          <header class="panel-header">
            <h2>실제 영역</h2>
            <p>Patch가 반영되는 대상 영역입니다.</p>
          </header>
          <div id="actual-root" class="panel-body"></div>
        </article>

        <article class="panel">
          <header class="panel-header">
            <h2>테스트 영역</h2>
            <p>이 영역은 `contenteditable`이며 자유롭게 수정할 수 있습니다.</p>
          </header>
          <div id="test-root" class="panel-body" contenteditable="true"></div>
        </article>
      </section>
    </main>

    <script type="module" src="./dist/index.js"></script>
  </body>
</html>
